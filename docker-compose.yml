version: '3.8'

services:
  cobra-bot:
    build: .
    container_name: cobra-cards-bot
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      CHAT_ID: ${CHAT_ID}
      API_PORT: 5000
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      DATABASE_PATH: /app/data/bot_data.db
      LOG_PATH: /app/logs/
    ports:
      - "5000:5000"
    volumes:
      - cobra_data:/app/data
      - cobra_logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  cobra_data:
    driver: local
  cobra_logs:
    driver: local
